      <stop offset="0" stop-color="#6fbf3f"/>
      <stop offset="1" stop-color="#4d9329"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- 흰 나뭇잎 (모여봐요 동물의 숲 잎 모티프) -->
